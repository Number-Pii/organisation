name: Toolkit CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Validate Python scripts compile without syntax errors
      - name: Check script syntax
        run: |
          python -m py_compile scripts/audit_skills.py
          python -m py_compile scripts/init_project.py
          python -m py_compile scripts/update.py
          python -m py_compile scripts/check_version.py

      # Run the skill audit — fails if any @skill refs are broken
      - name: Audit skill coverage
        run: python3 scripts/audit_skills.py --no-color

      # Check VERSION, CHANGELOG, CLAUDE.md, and GEMINI.md are in sync
      - name: Validate version sync
        run: python3 scripts/check_version.py

      # Check CLAUDE.md and GEMINI.md haven't drifted apart
      - name: Check CLAUDE.md / GEMINI.md sync
        run: |
          # The only allowed difference is the handover instruction in Step 7.
          # Replace the known difference so both files should be identical.
          CLAUDE_NORM=$(sed 's/Initialize CLAUDE\.md/Initialize __AI__\.md/g' CLAUDE.md | sed 's/paired with GEMINI\.md/paired with __PAIR__\.md/g')
          GEMINI_NORM=$(sed 's/Initialize GEMINI\.md/Initialize __AI__\.md/g' GEMINI.md | sed 's/paired with CLAUDE\.md/paired with __PAIR__\.md/g')

          if [ "$CLAUDE_NORM" != "$GEMINI_NORM" ]; then
            echo "CLAUDE.md and GEMINI.md have drifted apart beyond the allowed difference."
            echo "Run: diff <(sed 's/CLAUDE/AI/g' CLAUDE.md) <(sed 's/GEMINI/AI/g' GEMINI.md)"
            exit 1
          fi
          echo "CLAUDE.md and GEMINI.md are in sync."
